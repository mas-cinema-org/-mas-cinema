const Store = {
  async get(key) {
    try {
      const { data, error } = await supabaseClient.from("app_data").select("value").eq("key", key).maybeSingle();
      if (error) throw error;
      return data ? data.value : null;
    } catch (e) { /* Supabase unreachable, fall through to local */ }
    try {
      const raw = window.localStorage.getItem("mc_local_" + key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      const { error } = await supabaseClient.from("app_data").upsert({ key, value, updated_at: new Date().toISOString() });
      if (error) throw error;
      return true;
    } catch (e) { /* fall through to local */ }
    try {
      window.localStorage.setItem("mc_local_" + key, JSON.stringify(value));
      return true;
    } catch (e) { return false; }
  },
};

/* Returns a background style object: uses movie.poster image if set,
   otherwise falls back to the color gradient. Used everywhere a poster
   or backdrop is shown so images just work without touching any JSX. */
function posterBg(movie, angle) {
  if (movie.poster) {
    return { backgroundImage: `url(${movie.poster})`, backgroundSize: "cover", backgroundPosition: "center" };
  }
  return { background: `linear-gradient(${angle}deg, ${movie.gradient[0]}, ${movie.gradient[1]})` };
}

/* ---------------------------- Small helpers ------------------------------ */

function seededRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (Math.imul(31, h) + seed.charCodeAt(i)) | 0;
  return function () {
    h = (h ^ (h << 13)) | 0; h = (h ^ (h >>> 17)) | 0; h = (h ^ (h << 5)) | 0;
    return ((h >>> 0) % 1000) / 1000;
  };
}

function generateSeatMap(seed) {
  const rows = ["A", "B", "C", "D", "E", "F", "G", "H"];
  return rows.map((row) => {
    const seats = Array.from({ length: 10 }, (_, i) => {
      const id = `${row}${i + 1}`;
      return { id, type: "standard", booked: false };
    });
    return { row, seats };
  });
}

function nextDates(n) {
  const out = []; const today = new Date(2026, 6, 16);
  for (let i = 0; i < n; i++) { const d = new Date(today); d.setDate(today.getDate() + i); out.push(d); }
  return out;
}
const SHOW_DATES = nextDates(6);
const SHOW_TIMES = ["12:00 م", "3:15 م", "6:30 م", "9:45 م"];

function fmtDate(d, lang) {
  return d.toLocaleDateString(lang === "ar" ? "ar-IQ" : "en-US", { weekday: "short", day: "numeric", month: "short" });
}
function fmtMoney(n) {
  return n.toLocaleString("en-US");

/* ------------------------------ Seat Map ---------------------------------- */

function SeatMap({ t, pricing, seatSeed, extraBooked, selectedSeats, setSelectedSeats }) {
  const seatMap = useMemo(() => {
    const base = generateSeatMap(seatSeed);
    if (!extraBooked || extraBooked.size === 0) return base;
    return base.map((row) => ({
      row: row.row,
      seats: row.seats.map((s) => (extraBooked.has(s.id) ? { ...s, booked: true } : s)),
    }));
  }, [seatSeed, extraBooked]);
  const toggleSeat = (seat) => {
    if (seat.booked) return;
    setSelectedSeats((prev) => {
      const exists = prev.find((s) => s.id === seat.id);
      if (exists) return prev.filter((s) => s.id !== seat.id);
      return [...prev, seat];
    });
  };
  const isSelected = (id) => selectedSeats.some((s) => s.id === id);

  return (
    <div className="seatmap-wrap">
      <div className="screen-wrap">
        <div className="screen-curve" />
        <span className="screen-label">SCREEN</span>
      </div>
      <div className="seat-rows">
        {seatMap.map(({ row, seats }) => (
          <div className="seat-row" key={row}>
            <span className="row-label">{row}</span>
            <div className="seat-row-seats">
              {seats.map((seat) => {
                const selected = isSelected(seat.id);
                const cls = seat.booked ? "seat seat-booked" : selected ? "seat seat-selected" : seat.type === "vip" ? "seat seat-vip" : "seat seat-standard";
                return <button key={seat.id} className={cls} disabled={seat.booked} onClick={() => toggleSeat(seat)} title={seat.id} />;
              })}
            </div>
            <span className="row-label">{row}</span>
          </div>
        ))}
      </div>
      <div className="seat-legend">
        <div className="legend-item"><span className="legend-swatch seat-standard" /> {t.standardSeatLegend} · <Num>{fmtMoney(pricing.standard)}</Num></div>
        <div className="legend-item"><span className="legend-swatch seat-selected" /> {t.selectedLegend}</div>
        <div className="legend-item"><span className="legend-swatch seat-booked" /> {t.takenLegend}</div>
      </div>
    </div>
  );
}

function Confetti() {
  const pieces = useMemo(() => {
    const colors = ["#E50914", "#D4AF37", "#00E676", "#ffffff", "#3a0ca3"];
    return Array.from({ length: 70 }, (_, i) => ({
      id: i, left: Math.random() * 100, delay: Math.random() * 1.2, duration: 2.6 + Math.random() * 1.8,
      color: colors[i % colors.length], size: 6 + Math.random() * 6, rotate: Math.random() * 360,
    }));
  }, []);
  return (
    <div className="confetti-wrap">
      {pieces.map((p) => (
        <span key={p.id} className="confetti-piece" style={{
          left: `${p.left}%`, background: p.color, width: p.size, height: p.size * 0.5,
          animationDelay: `${p.delay}s`, animationDuration: `${p.duration}s`, transform: `rotate(${p.rotate}deg)`,
        }} />
      ))}
    </div>
  );
}

function FakeQR({ seed }) {
  const cells = useMemo(() => {
    const rand = seededRandom(seed); const n = 11;
    return { grid: Array.from({ length: n * n }, () => rand() > 0.55), n };
  }, [seed]);
  const isFinder = (x, y, n) => {
    const inCorner = (cx, cy) => x >= cx && x < cx + 3 && y >= cy && y < cy + 3;
    return inCorner(0, 0) || inCorner(n - 3, 0) || inCorner(0, n - 3);
  };
  return (
    <div className="qr-grid" style={{ gridTemplateColumns: `repeat(${cells.n}, 1fr)` }}>
      {cells.grid.map((on, i) => {
        const x = i % cells.n, y = Math.floor(i / cells.n);
        return <span key={i} className="qr-cell" style={{ background: isFinder(x, y, cells.n) || on ? "#0B0C10" : "transparent" }} />;
      })}
    </div>
  );
}

function BookingModal({ t, lang, movie, business, pricing, snacks, onClose, onConfirmed }) {
  const [step, setStep] = useState("detail");
  const [selectedDate, setSelectedDate] = useState(SHOW_DATES[0]);
  const [selectedTime, setSelectedTime] = useState(null);
  const [selectedSeats, setSelectedSeats] = useState([]);
  const [addons, setAddons] = useState({});
  const [bookingId, setBookingId] = useState(null);
  const [customer, setCustomer] = useState({ name: "", phone: "" });
  const [extraBooked, setExtraBooked] = useState(new Set());

  const seatSeed = `${movie.id}-${selectedDate.toDateString()}-${selectedTime}`;

  // Pull real bookings from the shared store so seats already reserved by
  // other customers (or sold by the cashier) show as taken here too.
  useEffect(() => {
    if (!selectedTime) return;
    let cancelled = false;
    (async () => {
      const all = (await Store.get("mc_bookings")) || [];
      if (cancelled) return;
      const ids = new Set();
      all.forEach((b) => {
        if (b.status === "cancelled") return;
        if (b.movieId === movie.id && b.date === selectedDate.toDateString() && b.time === selectedTime) {
          (b.seats || []).forEach((s) => ids.add(s.id));
        }
      });
      setExtraBooked(ids);
    })();
    return () => { cancelled = true; };
  }, [movie.id, selectedDate, selectedTime]);

  const seatTotal = selectedSeats.length * pricing.standard;
  const addonTotal = snacks.reduce((sum, s) => sum + (addons[s.id] || 0) * s.price, 0);
  const fee = selectedSeats.length > 0 ? 1000 : 0;
  const grandTotal = seatTotal + addonTotal + fee;

  const customerValid = customer.name.trim().length > 1 && customer.phone.replace(/\D/g, "").length >= 10;

  const title = lang === "ar" ? movie.titleAr : movie.titleEn;

  const buildWhatsAppMessage = (id) => {
    const snackList = snacks.filter((s) => addons[s.id] > 0)
      .map((s) => `${addons[s.id]}x ${lang === "ar" ? s.nameAr : s.nameEn}`).join(", ") || (lang === "ar" ? "لا يوجد" : "None");
    const lines = lang === "ar"
      ? [
          `مرحباً ${business.nameAr}، أريد تأكيد حجز:`,
          `🎬 الفيلم: ${title}`,
          `📅 الموعد: ${fmtDate(selectedDate, lang)} - ${selectedTime}`,
          `💺 المقاعد: ${selectedSeats.map((s) => s.id).join(", ")}`,
          `🍿 الوجبات: ${snackList}`,
          `💰 المجموع: ${fmtMoney(grandTotal)} د.ع`,
          `🔖 رقم الحجز: ${id}`,
          `👤 الاسم: ${customer.name}`,
          `📱 الهاتف: ${customer.phone}`,
        ]
      : [
          `Hi ${business.nameEn}, I'd like to confirm a booking:`,
          `Movie: ${title}`,
          `Showtime: ${fmtDate(selectedDate, lang)} - ${selectedTime}`,
          `Seats: ${selectedSeats.map((s) => s.id).join(", ")}`,
          `Snacks: ${snackList}`,
          `Total: ${fmtMoney(grandTotal)} IQD`,
          `Booking ID: ${id}`,
          `Name: ${customer.name}`,
          `Phone: ${customer.phone}`,
        ];
    return lines.join("\n");
  };

  const handleConfirm = () => {
    const id = genBookingId(); setBookingId(id); setStep("success");
    const message = buildWhatsAppMessage(id);
    window.open(`${business.whatsapp}?text=${encodeURIComponent(message)}`, "_blank");
    onConfirmed({ id, movie, date: selectedDate, time: selectedTime, seats: selectedSeats, addons, total: grandTotal, customer });
  };

  const stepOrder = ["detail", "seats", "addons", "checkout", "success"];
  const stepIndex = stepOrder.indexOf(step);

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-card" onClick={(e) => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><X size={18} /></button>

        {step !== "success" && (
          <div className="modal-steps">
            {[t.stepDetails, t.stepSeats, t.stepSnacks, t.stepPayment].map((label, i) => (
              <div key={label} className={"step-pill" + (i <= stepIndex ? " step-pill-active" : "")}><span><Num>{i + 1}</Num></span> {label}</div>
            ))}
          </div>
        )}

        {step === "detail" && (
          <MovieDetailStep t={t} lang={lang} movie={movie} selectedDate={selectedDate} setSelectedDate={setSelectedDate}
            selectedTime={selectedTime} setSelectedTime={setSelectedTime} onNext={() => setStep("seats")} />
        )}

        {step === "seats" && (
          <div className="step-body">
            <div className="step-header">
              <button className="btn-icon" onClick={() => setStep("detail")}><ArrowIcon lang={lang} dir="back" /></button>
              <div><h3>{t.chooseSeats}</h3><p className="step-sub">{title} · {fmtDate(selectedDate, lang)} · <Num>{selectedTime}</Num></p></div>
            </div>
            <SeatMap t={t} pricing={pricing} seatSeed={seatSeed} extraBooked={extraBooked} selectedSeats={selectedSeats} setSelectedSeats={setSelectedSeats} />
            <ModalFooter
              left={`${selectedSeats.length} ${selectedSeats.length === 1 ? t.seatsSelected : t.seatsSelectedPlural}`}
              price={seatTotal} buttonLabel={t.continueToSnacks} disabled={selectedSeats.length === 0} onClick={() => setStep("addons")}
            />

        {step === "addons" && (

            </div>
            <div className="checkout-grid">
              <div className="ticket-stub">
                <div className="ticket-stub-main">
                  <h4>{title}</h4>
                  <p className="stub-line"><Calendar size={13} /> {fmtDate(selectedDate, lang)} · <Num>{selectedTime}</Num></p>
                  <p className="stub-line"><Users size={13} /> <Num>{selectedSeats.map((s) => s.id).join(", ")}</Num></p>

                  <div className="stub-row"><span>{t.snacksLine}</span><span><Num>{fmtMoney(addonTotal)}</Num></span></div>
                  <div className="stub-row"><span>{t.feeLine}</span><span><Num>{fmtMoney(fee)}</Num></span></div>
                  <div className="stub-row stub-total"><span>{t.totalLine}</span><span><Num>{fmtMoney(grandTotal)}</Num></span></div>
                </div>
                <div className="ticket-perforation" />
                <div className="ticket-stub-side"><QrCode size={26} color="#0B0C10" /><span>{title.slice(0, 12).toUpperCase()}</span></div>
              </div>

              <div className="payment-form">
                <p className="whatsapp-note"><MessageCircle size={15} color="#25D366" /> {t.whatsappFlowNote}</p>
                <label>{t.customerName}
                  <input placeholder={lang === "ar" ? "مثال: أحمد علي" : "e.g. Ahmed Ali"} value={customer.name}

            </div>
            <ModalFooter left={t.totalDueToday} price={grandTotal} buttonLabel={t.sendWhatsapp} disabled={!customerValid} onClick={handleConfirm} />
          </div>
        )}

        {step === "success" && (
          <SuccessStep t={t} lang={lang} bookingId={bookingId} movie={movie} date={selectedDate} time={selectedTime}
            seats={selectedSeats} total={grandTotal} onClose={onClose} />
        )}
      </div>
    </div>
  );

function App() {
  const [lang, setLang] = useState("ar");
  const t = TXT[lang];
  const dir = lang === "ar" ? "rtl" : "ltr";

  const [search, setSearch] = useState("");
  const [genre, setGenre] = useState("All");
  const [minRating, setMinRating] = useState(0);
  const [activeMovie, setActiveMovie] = useState(null);
  const [bookings, setBookings] = useState([]);
  const [showBookings, setShowBookings] = useState(false);

  // Live data: seeded with the defaults above, then overridden by whatever
  // the admin/cashier site has saved to the shared store (if anything).
  const [movies, setMovies] = useState(DEFAULT_MOVIES);
  const [business, setBusiness] = useState(DEFAULT_BUSINESS);
  const [pricing, setPricing] = useState(DEFAULT_PRICING);
  const [snacks, setSnacks] = useState(DEFAULT_SNACKS);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      const [m, settings] = await Promise.all([Store.get("mc_movies"), Store.get("mc_settings")]);
      if (cancelled) return;
      if (Array.isArray(m)) setMovies(m);
      if (settings) {
        if (settings.business) setBusiness((prev) => ({ ...prev, ...settings.business }));
        if (settings.pricing) setPricing((prev) => ({ ...prev, ...settings.pricing }));
        if (Array.isArray(settings.snacks) && settings.snacks.length) setSnacks(settings.snacks);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const brandName = lang === "ar" ? business.nameAr : business.nameEn;

  const filteredShowing = useMemo(() => {
    return movies.filter((m) => {
      if (m.status !== "showing") return false;
      if (genre !== "All" && !m.genres.includes(genre)) return false;
      if (m.rating < minRating) return false;
      const title = (lang === "ar" ? m.titleAr : m.titleEn).toLowerCase();
      if (search.trim() && !title.includes(search.trim().toLowerCase())) return false;
      return true;
    });
  }, [movies, genre, minRating, search, lang]);

  const comingSoon = useMemo(() => movies.filter((m) => m.status === "soon"), [movies]);
  const heroMovies = useMemo(() => {
    const showing = movies.filter((m) => m.status === "showing");
    return showing.length ? showing : movies;
  }, [movies]);

  // Confirming a booking here (customer side) both keeps a local copy for
  // "My Bookings" AND pushes a record to the shared store, keyed so the
  // admin/cashier site's Bookings tab picks it up (status starts "pending"
  // since it still needs a human at the cinema to confirm it on WhatsApp).
  const handleConfirmed = useCallback(async (booking) => {
    setBookings((prev) => [...prev, booking]);
    const record = {
      id: booking.id,
      movieId: booking.movie.id,
      titleAr: booking.movie.titleAr,
      titleEn: booking.movie.titleEn,
      date: booking.date.toDateString(),
      time: booking.time,
      seats: booking.seats,
      addons: booking.addons,
      total: booking.total,
      customerName: booking.customer ? booking.customer.name : "",
      customerPhone: booking.customer ? booking.customer.phone : "",
      source: "online",
      status: "pending",
      createdAt: Date.now(),
    };
    const existing = (await Store.get("mc_bookings")) || [];
    await Store.set("mc_bookings", [...existing, record]);
  }, []);

  const handleNav = (key) => {
    if (key === "top") { window.scrollTo({ top: 0, behavior: "smooth" }); return; }
    const el = document.getElementById(`sec-${key}`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  return (
    <div className="app-root" dir={dir}>
      <style>{CSS}</style>

      <Navbar t={t} lang={lang} setLang={setLang} search={search} onSearch={setSearch} brandName={brandName}
        onOpenBookings={() => setShowBookings(true)} bookingsCount={bookings.length} onNav={handleNav} />

      <Hero t={t} lang={lang} business={business} movies={heroMovies} onBook={setActiveMovie} onDetails={setActiveMovie} />
      <OfferBanner t={t} />

      <main className="main-content">
        <div id="sec-movies">
          <FilterBar t={t} lang={lang} genre={genre} setGenre={setGenre} minRating={minRating} setMinRating={setMinRating} />
          <MovieGrid t={t} lang={lang} movies={filteredShowing} onOpen={setActiveMovie} title={t.nowShowing} />
          {comingSoon.length > 0 && <MovieGrid t={t} lang={lang} movies={comingSoon} onOpen={setActiveMovie} title={t.comingSoon} />}
        </div>

        <PricingSection t={t} pricing={pricing} />
        <LocationSection t={t} lang={lang} business={business} />
        <ContactSection t={t} business={business} />
      </main>

      <footer className="app-footer">
        <div className="footer-logo"><span className="logo-badge small"><img src={LOGO_IMG} alt="Mas Cinema" className="logo-img" /></span> {brandName}</div>
        <p><Num>{t.footerRightsPrefix}</Num> {brandName} {t.footerRightsSuffix}</p>
        <p className="footer-group">{lang === "ar" ? business.groupAr : business.groupEn}</p>
      </footer>

      {activeMovie && (
        <BookingModal t={t} lang={lang} movie={activeMovie} business={business} pricing={pricing} snacks={snacks}
          onClose={() => setActiveMovie(null)} onConfirmed={handleConfirmed} />
      )}
      {showBookings && <MyBookingsPanel t={t} lang={lang} bookings={bookings} onClose={() => setShowBookings(false)} />}
    </div>
  );
}


const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#0B0C10;
  --surface:#14161B;
  --surface-2:#1B1E24;
  --border: rgba(255,255,255,0.08);
  --text:#F3F4F6;
  --text-dim:#9CA3AF;
  --red:#E50914;
  --gold:#D4AF37;
  --green:#00E676;
  --danger:#7A0C13;
}

*{ box-sizing:border-box; }
.app-root{
  background:var(--bg);
  color:var(--text);
  font-family:'Tajawal','Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}
.app-root[dir="ltr"]{ font-family:'Inter','Tajawal',sans-serif; }

/* ---------- Navbar ---------- */
.navbar{ position:sticky; top:0; z-index:40; background:rgba(11,12,16,0.7); backdrop-filter:blur(16px) saturate(150%); border-bottom:1px solid var(--border); }
.navbar-inner{ max-width:1400px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:14px 28px; gap:20px; }
.nav-left{ display:flex; align-items:center; gap:28px; }
.logo{ display:flex; align-items:center; gap:9px; cursor:pointer; }
.logo-badge{
  width:34px; height:30px; border-radius:9px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  filter:drop-shadow(0 0 8px rgba(212,175,55,0.45));
}
.logo-badge.small{ width:26px; height:22px; border-radius:7px; }
.logo-img{ width:100%; height:100%; object-fit:contain; }
.logo-text{ font-family:'Bebas Neue', sans-serif; font-size:22px; letter-spacing:1px; }
.app-root[dir="rtl"] .logo-text{ font-family:'Tajawal', sans-serif; font-weight:800; font-size:19px; letter-spacing:0; }
.nav-links{ display:flex; gap:4px; }
.nav-link{ background:none; border:none; color:var(--text-dim); font-size:14px; font-weight:600; padding:8px 13px; border-radius:8px; cursor:pointer; transition:all .2s; }
.nav-link:hover{ color:var(--text); background:rgba(255,255,255,0.06); }
.nav-search{ flex:1; max-width:300px; display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:9px 14px; }
.nav-search input{ background:none; border:none; outline:none; color:var(--text); font-size:13px; width:100%; font-family:inherit; }
.nav-search input::placeholder{ color:#6b7280; }
.nav-right{ display:flex; align-items:center; gap:10px; }
.lang-btn{ font-weight:700; }
.nav-bookings{ position:relative; display:flex; align-items:center; gap:6px; }
.badge-count{ background:var(--red); color:#fff; font-size:10px; font-weight:700; border-radius:999px; padding:1px 6px; margin-inline-start:2px; }
.mobile-menu-btn{ display:none; background:none; border:none; color:var(--text); }
.mobile-panel{ display:none; }

/* ---------- Buttons ---------- */
.btn-primary{
  display:inline-flex; align-items:center; gap:8px; justify-content:center;
  background:linear-gradient(135deg, var(--red), #ff3b30); color:#fff; border:none;
  padding:12px 20px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer;
  box-shadow:0 8px 24px rgba(229,9,20,0.35); transition:transform .18s ease, box-shadow .18s ease, opacity .18s;
  font-family:inherit; text-decoration:none;
}
.btn-primary:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 12px 30px rgba(229,9,20,0.5); }
.btn-primary:disabled{ opacity:.4; cursor:not-allowed; box-shadow:none; }
.btn-primary.full{ width:100%; }
.btn-secondary{
  display:inline-flex; align-items:center; gap:8px; justify-content:center;
  background:rgba(255,255,255,0.08); color:#fff; border:1px solid rgba(255,255,255,0.15);
  padding:12px 20px; border-radius:10px; font-weight:600; font-size:14px; cursor:pointer;
  backdrop-filter:blur(6px); transition:background .18s; text-decoration:none; font-family:inherit;
}
.btn-secondary:hover{ background:rgba(255,255,255,0.16); }
.btn-ghost{
  display:flex; align-items:center; gap:6px; background:none; border:1px solid var(--border);
  color:var(--text-dim); padding:9px 14px; border-radius:9px; font-size:13px; font-weight:600; cursor:pointer;
  transition:all .18s; font-family:inherit;
}
.btn-ghost:hover{ color:#fff; border-color:rgba(255,255,255,0.25); }
.btn-icon{ background:var(--surface-2); border:1px solid var(--border); color:#fff; width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }

/* ---------- Hero ---------- */
.hero{ position:relative; min-height:500px; display:flex; align-items:flex-end; overflow:hidden; padding:56px 40px; }
.hero-blur{ position:absolute; inset:0; background:radial-gradient(ellipse at 70% 20%, rgba(255,255,255,0.12), transparent 60%); filter:blur(40px); }
.hero-overlay{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(11,12,16,0.2) 0%, rgba(11,12,16,0.75) 75%, var(--bg) 100%); }
.hero-content{ position:relative; z-index:2; max-width:640px; }
.hero-eyebrow{ display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--gold); margin-bottom:14px; }
.hero-title{ font-family:'Bebas Neue', sans-serif; font-size:56px; line-height:1; letter-spacing:1px; margin:0 0 10px; text-shadow:0 4px 30px rgba(0,0,0,0.5); }
.app-root[dir="rtl"] .hero-title{ font-family:'Tajawal', sans-serif; font-weight:800; font-size:42px; letter-spacing:0; }
.hero-tagline{ color:#e5e7eb; font-size:16px; margin:0 0 16px; opacity:0.9; line-height:1.6; }
.hero-meta{ display:flex; align-items:center; gap:10px; font-size:13px; color:#d1d5db; margin-bottom:14px; }
.meta-dot{ width:3px; height:3px; border-radius:50%; background:#6b7280; }
.rating-pill{ display:inline-flex; align-items:center; gap:5px; background:rgba(212,175,55,0.15); border:1px solid rgba(212,175,55,0.4); color:var(--gold); padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; }
.rating-pill.small{ padding:3px 8px; font-size:11px; }
.duration-pill{ display:inline-flex; align-items:center; gap:4px; background:rgba(255,255,255,0.12); padding:3px 8px; border-radius:999px; font-size:11px; font-weight:600; color:#fff; }
.hero-genres{ display:flex; gap:8px; margin-bottom:22px; flex-wrap:wrap; }
.genre-tag{ background:rgba(255,255,255,0.08); border:1px solid var(--border); padding:5px 12px; border-radius:999px; font-size:12px; font-weight:600; color:#e5e7eb; }
.hero-actions{ display:flex; gap:12px; flex-wrap:wrap; }
.hero-dots{ position:absolute; bottom:24px; inset-inline-end:40px; display:flex; gap:8px; z-index:3; }
.hero-dot{ width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; cursor:pointer; transition:all .25s; }
.hero-dot-active{ background:var(--red); width:24px; border-radius:5px; }

/* ---------- Offer banner ---------- */
.offer-banner{
  display:flex; align-items:center; justify-content:center; gap:10px;
  background:linear-gradient(90deg, var(--gold), #ffe28a); color:#1a1400;
  font-weight:700; font-size:13.5px; padding:11px 20px; text-align:center;
}

/* ---------- Main / Filter Bar ---------- */
.main-content{ max-width:1400px; margin:0 auto; padding:36px 28px 20px; }
.filter-bar{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:26px; }
.filter-genres{ display:flex; gap:8px; flex-wrap:wrap; }
.chip{ background:var(--surface); border:1px solid var(--border); color:var(--text-dim); padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600; cursor:pointer; transition:all .18s; font-family:inherit; }
.chip:hover{ color:#fff; border-color:rgba(255,255,255,0.25); }
.chip-active{ background:var(--red); border-color:var(--red); color:#fff; }
.filter-selects{ display:flex; gap:10px; }
.select-wrap{ display:flex; align-items:center; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text-dim); }
.select-wrap select{ background:none; border:none; color:var(--text); font-size:12.5px; outline:none; font-family:inherit; }
.select-wrap select option{ background:var(--surface); }

/* ---------- Movie Grid ---------- */
.section-title{ font-family:'Bebas Neue', sans-serif; font-size:26px; letter-spacing:0.5px; margin:0 0 6px; }
.app-root[dir="rtl"] .section-title{ font-family:'Tajawal', sans-serif; font-weight:800; font-size:22px; letter-spacing:0; }
.section-sub{ color:var(--text-dim); font-size:13.5px; margin:0 0 18px; }
.movie-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:22px; margin-bottom:14px; }
.movie-card{ cursor:pointer; }
.poster{ position:relative; aspect-ratio:2/3; border-radius:14px; overflow:hidden; display:flex; align-items:center; justify-content:center; border:1px solid var(--border); transition:transform .3s ease, box-shadow .3s ease; }
.movie-card:hover .poster{ transform:scale(1.04) translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,0.5); }
.poster-shine{ position:absolute; inset:0; background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%); }
.soon-badge{ position:absolute; top:10px; inset-inline-start:10px; background:rgba(11,12,16,0.75); backdrop-filter:blur(4px); border:1px solid var(--gold); color:var(--gold); font-size:10px; font-weight:700; padding:4px 9px; border-radius:999px; }
.poster-hover{ position:absolute; inset:0; background:linear-gradient(180deg, transparent 30%, rgba(0,0,0,0.92) 100%); display:flex; flex-direction:column; justify-content:flex-end; padding:14px; gap:10px; opacity:0; transition:opacity .25s ease; }
.movie-card:hover .poster-hover{ opacity:1; }
.poster-hover-top{ display:flex; gap:8px; }
.movie-card-body{ padding-top:12px; }
.movie-card-body h3{ font-size:15px; margin:0 0 4px; font-weight:700; }
.movie-card-genres{ font-size:12px; color:var(--text-dim); margin:0; }
.empty-state{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:50px 0; color:var(--text-dim); font-size:14px; }
.grid-section{ margin-bottom:44px; scroll-margin-top:90px; }

/* ---------- Pricing ---------- */
.pricing-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:18px; }
.price-card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px; display:flex; flex-direction:column; gap:8px; }
.price-card-highlight{ border-color:rgba(0,230,118,0.4); background:linear-gradient(160deg, rgba(0,230,118,0.08), var(--surface)); }
.price-card-label{ font-size:13px; color:var(--text-dim); font-weight:600; margin-top:6px; }
.price-card-value{ font-family:'Bebas Neue', sans-serif; font-size:30px; letter-spacing:0.5px; }
.app-root[dir="rtl"] .price-card-value{ font-family:'Tajawal', sans-serif; font-weight:800; font-size:24px; }
.price-card-note{ font-size:12px; color:var(--text-dim); }

/* ---------- Location ---------- */
.location-grid{ display:grid; grid-template-columns:1fr 1.2fr; gap:22px; align-items:stretch; }
.location-info{ display:flex; flex-direction:column; gap:16px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:22px; }
.info-row{ display:flex; align-items:flex-start; gap:12px; }
.info-row strong{ display:block; font-size:13.5px; margin-bottom:3px; }
.info-row p{ margin:0; font-size:13px; color:var(--text-dim); line-height:1.6; }
.map-embed{ border-radius:16px; overflow:hidden; border:1px solid var(--border); min-height:260px; }
.map-embed iframe{ width:100%; height:100%; min-height:260px; border:0; filter:grayscale(0.2) invert(0.92) contrast(0.9); }

/* ---------- Contact ---------- */
.contact-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:16px; }
.contact-card{
  display:flex; flex-direction:column; gap:6px; background:var(--surface); border:1px solid var(--border);
  border-radius:14px; padding:18px; text-decoration:none; color:var(--text); transition:all .2s;
}
.contact-card:hover{ border-color:var(--red); transform:translateY(-2px); }
.contact-icon{ width:36px; height:36px; border-radius:10px; background:rgba(229,9,20,0.12); display:flex; align-items:center; justify-content:center; }
.contact-label{ font-size:12px; color:var(--text-dim); font-weight:600; }
.contact-value{ font-size:14px; font-weight:700; }

/* ---------- Footer ---------- */
.app-footer{ border-top:1px solid var(--border); padding:28px; text-align:center; color:var(--text-dim); font-size:13px; display:flex; flex-direction:column; align-items:center; gap:6px; }
.footer-logo{ display:flex; align-items:center; gap:6px; font-family:'Bebas Neue', sans-serif; font-size:16px; color:#fff; }
.app-root[dir="rtl"] .footer-logo{ font-family:'Tajawal', sans-serif; font-weight:800; font-size:14px; }
.footer-group{ font-size:11.5px; opacity:0.7; }

/* ---------- Modal ---------- */
.modal-overlay{ position:fixed; inset:0; background:rgba(0,0,0,0.75); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; animation:fadeIn .2s ease; }
@keyframes fadeIn{ from{ opacity:0 } to{ opacity:1 } }
.modal-card{ background:var(--surface); border:1px solid var(--border); border-radius:20px; width:100%; max-width:760px; max-height:88vh; overflow-y:auto; position:relative; animation:popIn .25s cubic-bezier(.2,.9,.3,1.2); }
@keyframes popIn{ from{ opacity:0; transform:scale(0.94) translateY(10px);} to{ opacity:1; transform:scale(1) translateY(0);} }
.modal-close{ position:absolute; top:16px; inset-inline-end:16px; z-index:5; background:rgba(0,0,0,0.5); border:none; color:#fff; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; backdrop-filter:blur(4px); }
.modal-steps{ display:flex; gap:6px; padding:20px 24px 0; flex-wrap:wrap; }
.step-pill{ display:flex; align-items:center; gap:6px; font-size:11.5px; font-weight:700; color:#5b5f6a; padding:6px 10px; border-radius:999px; background:var(--surface-2); }
.step-pill span{ width:16px; height:16px; border-radius:50%; background:#2a2d34; color:#8b8f9a; display:flex; align-items:center; justify-content:center; font-size:9.5px; }
.step-pill-active{ color:#fff; background:rgba(229,9,20,0.18); }
.step-pill-active span{ background:var(--red); color:#fff; }
.step-body{ padding:22px 24px 24px; }
.step-header{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.step-header h3{ margin:0; font-size:19px; }
.step-sub{ margin:2px 0 0; font-size:12.5px; color:var(--text-dim); }

/* ---------- Detail step ---------- */
.detail-backdrop{ position:relative; border-radius:14px; height:200px; overflow:hidden; display:flex; align-items:flex-end; margin-top:14px; margin-bottom:18px; }
.detail-backdrop-overlay{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0.1), rgba(0,0,0,0.85)); }
.trailer-play{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:56px; height:56px; border-radius:50%; background:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:2; transition:transform .2s; }
.trailer-play:hover{ transform:translate(-50%,-50%) scale(1.08); }
.trailer-play-active{ animation:pulseRing 1.4s ease-out infinite; }
@keyframes pulseRing{ 0%{ box-shadow:0 0 0 0 rgba(255,255,255,0.5); } 100%{ box-shadow:0 0 0 26px rgba(255,255,255,0); } }
.detail-backdrop-info{ position:relative; z-index:2; padding:16px 20px; }
.detail-backdrop-info h2{ font-family:'Bebas Neue', sans-serif; font-size:28px; margin:0; letter-spacing:0.5px; }
.app-root[dir="rtl"] .detail-backdrop-info h2{ font-family:'Tajawal', sans-serif; font-weight:800; font-size:24px; }
.detail-meta-row{ display:flex; align-items:center; gap:10px; font-size:13px; color:#d1d5db; margin-bottom:12px; flex-wrap:wrap; }
.soon-text{ color:var(--gold); font-weight:600; }
.synopsis{ font-size:14px; line-height:1.8; color:#d1d5db; margin:14px 0; }
.subheading{ font-size:13px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-dim); margin:20px 0 10px; }
.cast-slider{ display:flex; gap:14px; overflow-x:auto; padding-bottom:6px; }
.cast-chip{ display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; width:64px; }
.cast-avatar{ width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg, var(--red), var(--gold)); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:14px; color:#fff; }
.cast-chip span{ font-size:10.5px; color:var(--text-dim); text-align:center; }
.date-row{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
.date-pill{ display:flex; flex-direction:column; align-items:center; gap:2px; min-width:56px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:10px 6px; cursor:pointer; color:var(--text-dim); flex-shrink:0; transition:all .18s; font-family:inherit; }
.date-pill-day{ font-size:10.5px; }
.date-pill-num{ font-size:16px; font-weight:800; color:#fff; }
.date-pill-active{ background:rgba(229,9,20,0.18); border-color:var(--red); }
.date-pill-active .date-pill-day{ color:#ffb3b8; }
.time-row{ display:flex; gap:8px; flex-wrap:wrap; }
.time-pill{ background:var(--surface-2); border:1px solid var(--border); color:#d1d5db; padding:9px 16px; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:all .18s; font-family:inherit; }
.time-pill-active{ background:var(--green); border-color:var(--green); color:#03210f; }
.soon-cta{ display:flex; align-items:center; gap:8px; background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3); color:var(--gold); padding:14px 16px; border-radius:12px; font-size:13px; margin-top:18px; }

/* ---------- Seat map ---------- */
.seatmap-wrap{ display:flex; flex-direction:column; align-items:center; gap:22px; padding:10px 0 6px; }
.screen-wrap{ display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; }
.screen-curve{ width:80%; max-width:420px; height:14px; border-radius:50% 50% 0 0 / 100% 100% 0 0; background:linear-gradient(180deg, rgba(0,230,118,0.6), rgba(0,230,118,0.05)); box-shadow:0 0 30px 6px rgba(0,230,118,0.35); }
.screen-label{ font-size:11px; letter-spacing:3px; color:var(--text-dim); }
.seat-rows{ display:flex; flex-direction:column; gap:8px; width:100%; align-items:center; }
.seat-row{ display:flex; align-items:center; gap:10px; }
.row-label{ font-size:11px; color:#5b5f6a; width:14px; text-align:center; }
.seat-row-seats{ display:flex; gap:6px; }
.seat{ width:22px; height:22px; border-radius:6px 6px 8px 8px; border:none; cursor:pointer; transition:transform .15s ease, box-shadow .15s ease; }
.seat:hover:not(:disabled){ transform:translateY(-2px) scale(1.12); }
.seat-standard{ background:#3a4250; }
.seat-vip{ background:linear-gradient(160deg, var(--gold), #8a6d1a); }
.seat-selected{ background:var(--green); box-shadow:0 0 12px rgba(0,230,118,0.7); }
.seat-booked{ background:var(--danger); opacity:0.55; cursor:not-allowed; }
.seat-legend{ display:flex; gap:18px; flex-wrap:wrap; justify-content:center; font-size:12px; color:var(--text-dim); }
.legend-item{ display:flex; align-items:center; gap:7px; }
.legend-swatch{ width:14px; height:14px; border-radius:4px; display:inline-block; }

/* ---------- Add-ons ---------- */
.addons-panel{ display:flex; flex-direction:column; gap:10px; }
.addon-row{ display:flex; align-items:center; gap:14px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
.addon-icon{ width:40px; height:40px; border-radius:10px; background:rgba(212,175,55,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.addon-info{ flex:1; display:flex; flex-direction:column; }
.addon-name{ font-size:13.5px; font-weight:700; }
.addon-desc{ font-size:11.5px; color:var(--text-dim); }
.qty-stepper{ display:flex; align-items:center; gap:10px; }
.qty-stepper button{ width:26px; height:26px; border-radius:7px; border:1px solid var(--border); background:var(--surface); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.qty-stepper button:disabled{ opacity:0.3; cursor:not-allowed; }
.qty-stepper span{ min-width:16px; text-align:center; font-weight:700; font-size:13px; }

/* ---------- Checkout ---------- */
.checkout-grid{ display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:6px; }
.payment-form{ display:flex; flex-direction:column; gap:14px; }
.payment-form label{ display:flex; flex-direction:column; gap:6px; font-size:12px; color:var(--text-dim); font-weight:600; }
.payment-form input{ background:var(--surface-2); border:1px solid var(--border); border-radius:9px; padding:11px 12px; color:#fff; font-size:13.5px; outline:none; transition:border .18s; font-family:inherit; }
.payment-form input:focus{ border-color:var(--red); }
.input-icon-wrap{ position:relative; display:flex; align-items:center; }
.input-icon-wrap input{ width:100%; padding-inline-end:34px; }
.input-icon-wrap svg{ position:absolute; inset-inline-end:12px; color:#6b7280; }
.form-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.secure-note{ display:flex; align-items:center; gap:6px; font-size:11px; color:#5b5f6a; margin-top:2px; }

/* ---------- Ticket stub ---------- */
.ticket-stub{ display:flex; background:linear-gradient(160deg, #fdfbf5, #f2ede0); border-radius:14px; overflow:hidden; color:#1a1a1a; min-height:100%; }
.ticket-stub-main{ flex:1; padding:16px 18px; }
.ticket-stub-main h4{ margin:0 0 8px; font-size:16px; font-weight:800; }
.stub-line{ display:flex; align-items:center; gap:6px; font-size:12px; color:#4a4a4a; margin:4px 0; }
.stub-divider{ border-top:1.5px dashed #c9c2ae; margin:10px 0; }
.stub-row{ display:flex; justify-content:space-between; font-size:12px; color:#4a4a4a; margin:3px 0; }
.stub-total{ font-weight:800; font-size:14px; color:#1a1a1a; margin-top:4px; }
.ticket-perforation{ width:0; border-left:2px dashed #c9c2ae; }
.ticket-stub-side{ width:88px; background:#e9e3d3; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:10px; }
.ticket-stub-side span{ writing-mode:vertical-rl; font-size:9px; letter-spacing:2px; font-weight:700; color:#6b6350; }
.qr-side{ gap:0; }

/* ---------- Modal footer ---------- */
.modal-footer{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-top:22px; padding-top:16px; border-top:1px solid var(--border); }
.footer-left{ display:flex; flex-direction:column; }
.footer-label{ font-size:11.5px; color:var(--text-dim); }
.footer-price{ font-size:20px; font-weight:800; color:var(--green); }

/* ---------- Success ---------- */
.success-step{ padding:36px 24px; text-align:center; position:relative; overflow:hidden; }
.success-icon{ display:flex; justify-content:center; margin-bottom:12px; animation:popIn .4s ease; }
.success-step h2{ font-family:'Bebas Neue', sans-serif; font-size:28px; margin:0 0 6px; letter-spacing:0.5px; }
.app-root[dir="rtl"] .success-step h2{ font-family:'Tajawal', sans-serif; font-weight:800; font-size:24px; }
.success-sub{ color:var(--text-dim); font-size:13.5px; margin:0 0 22px; }
.success-ticket{ max-width:420px; margin:0 auto; text-align:start; }
.booking-id{ display:block; margin-top:10px; font-size:10.5px; color:#8a8168; letter-spacing:0.5px; }
.success-actions{ display:flex; gap:12px; justify-content:center; margin-top:24px; }
.qr-grid{ display:grid; width:70px; height:70px; gap:1px; }
.qr-cell{ width:100%; height:100%; }

/* ---------- Confetti ---------- */
.confetti-wrap{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.confetti-piece{ position:absolute; top:-20px; border-radius:2px; opacity:0.9; animation-name:fall; animation-timing-function:ease-in; animation-fill-mode:forwards; }
@keyframes fall{ to{ transform:translateY(560px) rotate(540deg); opacity:0; } }

/* ---------- My Bookings ---------- */
.bookings-card{ max-width:480px; padding:26px 24px; }
.bookings-title{ display:flex; align-items:center; gap:8px; font-size:18px; margin:0 0 18px; }
.bookings-list{ display:flex; flex-direction:column; gap:12px; }
.mini-ticket{ display:flex; align-items:center; gap:12px; background:var(--surface-2); border:1px solid var(--border); border-radius:12px; overflow:hidden; padding:10px; }
.mini-ticket-strip{ width:6px; align-self:stretch; border-radius:4px; }
.mini-ticket-body{ flex:1; }
.mini-ticket-body h4{ margin:0 0 2px; font-size:13.5px; }
.mini-ticket-body p{ margin:1px 0; font-size:11.5px; color:var(--text-dim); }
.mini-ticket-seats{ color:#8b8f9a !important; }
.mini-ticket-price{ font-weight:800; color:var(--green); font-size:14px; }

/* ---------- Responsive ---------- */
@media (max-width: 860px){
  .checkout-grid, .location-grid{ grid-template-columns:1fr; }
  .hero-title{ font-size:38px; }
  .hero{ padding:36px 20px; min-height:420px; }
}
@media (max-width: 720px){
  .nav-links, .nav-search{ display:none; }
  .mobile-menu-btn{ display:flex; }
  .mobile-panel{ display:flex; flex-direction:column; gap:6px; padding:12px 20px 18px; border-top:1px solid var(--border); }
  .nav-bookings span{ display:none; }
  .hero-title{ font-size:32px; }
  .movie-grid{ grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:14px; }
  .form-row{ grid-template-columns:1fr 1fr; }
}
`;
