   Backed by Supabase (Postgres). Both this site and the public site read &
   write the SAME "app_data" table, so anything saved here shows up on the
   public site automatically. Falls back to localStorage if Supabase can't
   be reached, so the page still works, just without cross-device sync.
   -------------------------------------------------------------------- */
const SUPABASE_URL = "https://dylqlzhsuynvydtstxim.supabase.co";
const SUPABASE_KEY = "sb_publishable_DGDmh5M7e8Sgt1MQJndIXg_yrf9QrYA";

const Store = {
  async get(key) {
    try {
      const { data, error } = await supabaseClient.from("app_data").select("value").eq("key", key).maybeSingle();
      if (error) throw error;
      return data ? data.value : null;
    } catch (e) { /* Supabase unreachable, fall through to local */ }
    try {
      const raw = window.localStorage.getItem("mc_local_" + key);
      return raw ? JSON.parse(raw) : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      const { error } = await supabaseClient.from("app_data").upsert({ key, value, updated_at: new Date().toISOString() });
      if (error) throw error;
      return true;
    } catch (e) { /* fall through to local */ }
    try {
      window.localStorage.setItem("mc_local_" + key, JSON.stringify(value));
      return true;
    } catch (e) { return false; }
  },
};

/* ---------------------------- Small helpers ------------------------------ */
function seededRandom(seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) h = (Math.imul(31, h) + seed.charCodeAt(i)) | 0;
  return function () { h = (h ^ (h << 13)) | 0; h = (h ^ (h >>> 17)) | 0; h = (h ^ (h << 5)) | 0; return ((h >>> 0) % 1000) / 1000; };
}
function generateSeatMap(seed) {
  const rows = ["A", "B", "C", "D", "E", "F", "G", "H"];
  return rows.map((row) => {
    const seats = Array.from({ length: 10 }, (_, i) => {
      const id = `${row}${i + 1}`;
      return { id, type: "standard", booked: false };
    });
    return { row, seats };
  });
}
function nextDates(n) {
  const out = []; const today = new Date(2026, 6, 16);
  for (let i = 0; i < n; i++) { const d = new Date(today); d.setDate(today.getDate() + i); out.push(d); }
  return out;
}
const SHOW_DATES = nextDates(6);
const SHOW_TIMES = ["12:00 م", "3:15 م", "6:30 م", "9:45 م"];
function fmtDate(d) { return (typeof d === "string" ? new Date(d) : d).toLocaleDateString("ar-IQ", { weekday: "short", day: "numeric", month: "short" }); }
function fmtMoney(n) { return (n || 0).toLocaleString("en-US"); }
function genId(prefix) { return prefix + "-" + Math.random().toString(36).slice(2, 8).toUpperCase(); }
function slugify(s) { return s.trim().toLowerCase().replace(/[^a-z0-9\u0600-\u06FF]+/g, "-").replace(/(^-|-$)/g, "") || genId("m"); }
function Num({ children }) { return React.createElement("span", { style: { direction: "ltr", unicodeBidi: "isolate", display: "inline-block" } }, children); }

function PosTab({ movies, pricing, snacks, bookings, onSell }) {
  const showingMovies = movies.filter((m) => m.status === "showing");
  const [movieId, setMovieId] = useState(showingMovies[0] ? showingMovies[0].id : "");
  const [date, setDate] = useState(SHOW_DATES[0]);
  const [time, setTime] = useState(null);
  const [selectedSeats, setSelectedSeats] = useState([]);
  const [addons, setAddons] = useState({});
  const [customerName, setCustomerName] = useState("");
  const [toast, setToast] = useState("");

  const movie = movies.find((m) => m.id === movieId);
  const seatSeed = movie ? `${movie.id}-${date.toDateString()}-${time}` : "none";

  const realBooked = useMemo(() => {
    const ids = new Set();
    bookings.forEach((b) => {
      if (b.status === "cancelled") return;
      if (b.movieId === movieId && b.date === date.toDateString() && b.time === time) {
        (b.seats || []).forEach((s) => ids.add(s.id));
      }
    });
    return ids;
  }, [bookings, movieId, date, time]);

  const seatMap = useMemo(() => {
    if (!time) return [];
    const base = generateSeatMap(seatSeed);
    return base.map((row) => ({ row: row.row, seats: row.seats.map((s) => (realBooked.has(s.id) ? { ...s, booked: true } : s)) }));
  }, [seatSeed, realBooked, time]);

  const toggleSeat = (seat) => {
    if (seat.booked) return;
    setSelectedSeats((prev) => (prev.find((s) => s.id === seat.id) ? prev.filter((s) => s.id !== seat.id) : [...prev, seat]));
  };

  const seatTotal = selectedSeats.length * pricing.standard;
  const addonTotal = snacks.reduce((sum, s) => sum + (addons[s.id] || 0) * s.price, 0);
  const grandTotal = seatTotal + addonTotal;

  const canSell = movie && time && selectedSeats.length > 0;

  const handleSell = async () => {
    const record = {
      id: genId("MC"), movieId: movie.id, titleAr: movie.titleAr, titleEn: movie.titleEn,
      date: date.toDateString(), time, seats: selectedSeats, addons, total: grandTotal,
      customerName: customerName.trim() || "زبون الصالة", customerPhone: "",
      source: "cashier", status: "confirmed", createdAt: Date.now(),
    };
    await onSell(record);
    setSelectedSeats([]); setAddons({}); setCustomerName("");
    setToast("تم تسجيل البيع بنجاح ✓");
    setTimeout(() => setToast(""), 2500);
  };

  return (
    <div className="tab-panel">
      <div className="pos-grid">
        <div className="pos-config card">
          <label className="field-label">الفيلم
            <select value={movieId} onChange={(e) => { setMovieId(e.target.value); setTime(null); setSelectedSeats([]); }}>
              {showingMovies.map((m) => <option key={m.id} value={m.id}>{m.titleAr}</option>)}
            </select>
          </label>
          <label className="field-label">التاريخ
            <div className="date-row">
              {SHOW_DATES.map((d) => (
                <button key={d.toDateString()} className={"date-pill" + (d.toDateString() === date.toDateString() ? " date-pill-active" : "")}
                  onClick={() => { setDate(d); setTime(null); setSelectedSeats([]); }}>
                  <span className="date-pill-day">{d.toLocaleDateString("ar-IQ", { weekday: "short" })}</span>
                  <span className="date-pill-num"><Num>{d.getDate()}</Num></span>
                </button>
              ))}
            </div>
          </label>
          <label className="field-label">الموعد
            <div className="time-row">
              {SHOW_TIMES.map((t) => (
                <button key={t} className={"time-pill" + (t === time ? " time-pill-active" : "")} onClick={() => { setTime(t); setSelectedSeats([]); }}>
                  <Num>{t}</Num>
                </button>
              ))}
            </div>
          </label>
          <label className="field-label">اسم الزبون (اختياري)
            <input value={customerName} onChange={(e) => setCustomerName(e.target.value)} placeholder="زبون الصالة" />
          </label>

          <div className="subheading">الوجبات</div>
          <div className="addons-panel">
            {snacks.map((s) => {
              const Icon = ICON_MAP[s.id] || Popcorn; const qty = addons[s.id] || 0;
              return (
                <div className="addon-row" key={s.id}>
                  <div className="addon-icon"><Icon size={18} color="#D4AF37" /></div>
                  <div className="addon-info"><span className="addon-name">{s.nameAr}</span><span className="addon-desc"><Num>{fmtMoney(s.price)}</Num> د.ع</span></div>
                  <div className="qty-stepper">
                    <button onClick={() => setAddons((p) => ({ ...p, [s.id]: Math.max(0, (p[s.id] || 0) - 1) }))} disabled={qty === 0}><Minus size={13} /></button>
                    <span><Num>{qty}</Num></span>
                    <button onClick={() => setAddons((p) => ({ ...p, [s.id]: (p[s.id] || 0) + 1 }))}><Plus size={13} /></button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        <div className="pos-seats card">
          {!time ? (
            <div className="empty-state"><Ticket size={28} color="#4b4f58" /><p>اختر فيلم وتاريخ وموعد لعرض المقاعد</p></div>
          ) : (
            <>
              <div className="seatmap-wrap">
                <div className="screen-wrap"><div className="screen-curve" /><span className="screen-label">SCREEN</span></div>
                <div className="seat-rows">
                  {seatMap.map(({ row, seats }) => (
                    <div className="seat-row" key={row}>
                      <span className="row-label">{row}</span>
                      <div className="seat-row-seats">
                        {seats.map((seat) => {
                          const selected = selectedSeats.some((s) => s.id === seat.id);
                          const cls = seat.booked ? "seat seat-booked" : selected ? "seat seat-selected" : seat.type === "vip" ? "seat seat-vip" : "seat seat-standard";
                          return <button key={seat.id} className={cls} disabled={seat.booked} onClick={() => toggleSeat(seat)} title={seat.id} />;

                      </div>
                      <span className="row-label">{row}</span>
                    </div>
                  ))}
                </div>
                <div className="seat-legend">
                  <div className="legend-item"><span className="legend-swatch seat-standard" /> عادي · <Num>{fmtMoney(pricing.standard)}</Num></div>
                  <div className="legend-item"><span className="legend-swatch seat-selected" /> محدد</div>
                  <div className="legend-item"><span className="legend-swatch seat-booked" /> محجوز</div>
                </div>
              </div>

              <div className="pos-summary">
                <div className="stub-row"><span>المقاعد ({selectedSeats.length})</span><span><Num>{fmtMoney(seatTotal)}</Num></span></div>

                <button className="btn-primary full" disabled={!canSell} onClick={handleSell}>
                  <ShoppingCart size={16} /> تسجيل بيع نقدي
                </button>
                {toast && <p className="toast-success"><Check size={13} /> {toast}</p>}

            </>
          )}
        </div>

    </div>
  );
}

/* Resizes + compresses an uploaded image client-side (canvas -> JPEG) so
   posters stay small even if the original photo is huge. Returns a
   data URI ready to store directly on the movie record. */
function compressImage(file, maxWidth = 500, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxWidth / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = () => reject(new Error("bad image"));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error("read failed"));
    reader.readAsDataURL(file);
  });
}

  const [posterLoading, setPosterLoading] = useState(false);
  const [posterError, setPosterError] = useState("");
  const [bannerLoading, setBannerLoading] = useState(false);
  const [bannerError, setBannerError] = useState("");
  const [timeInput, setTimeInput] = useState("");
  const [formError, setFormError] = useState("");

  const onPosterFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setPosterError("");
    setPosterLoading(true);
    try {
      const dataUrl = await compressImage(file);
      setF((p) => ({ ...p, poster: dataUrl }));
    } catch (err) {
      setPosterError("تعذّر تحميل الصورة، جرّب صورة ثانية");
    }
    setPosterLoading(false);
    e.target.value = "";
  };

  const onBannerFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setBannerError("");
    setBannerLoading(true);
    try {
      const dataUrl = await compressImage(file, 1280);
      setF((p) => ({ ...p, banner: dataUrl }));
    } catch (err) {
      setBannerError("تعذّر تحميل الصورة، جرّب صورة ثانية");
    }
    setBannerLoading(false);
    e.target.value = "";
  };

  const addTime = () => {
    const v = timeInput.trim();
    if (!v) return;
    setF((p) => ({ ...p, showtimes: [...p.showtimes, v] }));
    setTimeInput("");
  };
  const removeTime = (i) => setF((p) => ({ ...p, showtimes: p.showtimes.filter((_, idx) => idx !== i) }));

  const toggleGenre = (g) => setF((p) => ({ ...p, genres: p.genres.includes(g) ? p.genres.filter((x) => x !== g) : [...p.genres, g] }));

  const save = () => {
    if (!f.titleAr.trim()) { setFormError("لازم تكتب اسم الفيلم (بالعربي) على الأقل قبل الحفظ."); return; }
    setFormError("");
    const titleEn = f.titleEn.trim() || f.titleAr.trim();
    const record = {
      ...f,
      titleEn,
      id: f.id || slugify(titleEn),
      rating: Number(f.rating) || 0,
      duration: Number(f.duration) || 0,
      cast: f.cast.split(",").map((c) => c.trim()).filter(Boolean),
      trailerUrl: f.trailerUrl.trim(),
    };
    onSave(record);
  };

  return (
    <div className="movie-form card">
      <div className="form-grid-2">
        <label className="field-label">الاسم (عربي)<input value={f.titleAr} onChange={(e) => setF((p) => ({ ...p, titleAr: e.target.value }))} /></label>
        <label className="field-label">Title (English) — اختياري<input value={f.titleEn} onChange={(e) => setF((p) => ({ ...p, titleEn: e.target.value }))} /></label>
      </div>
      <div className="form-grid-3">
        <label className="field-label">التقييم<input type="number" step="0.1" min="0" max="10" value={f.rating} onChange={(e) => setF((p) => ({ ...p, rating: e.target.value }))} /></label>
        <label className="field-label">المدة (د)<input type="number" min="0" value={f.duration} onChange={(e) => setF((p) => ({ ...p, duration: e.target.value }))} /></label>
        <label className="field-label">التصنيف العمري
          <select value={f.ageRating} onChange={(e) => setF((p) => ({ ...p, ageRating: e.target.value }))}>
            {["G", "PG", "PG-13", "R"].map((a) => <option key={a} value={a}>{a}</option>)}
          </select>
        </label>
      </div>
      <div className="form-grid-2">
        <label className="field-label">الحالة
          <select value={f.status} onChange={(e) => setF((p) => ({ ...p, status: e.target.value }))}>
            <option value="showing">يعرض حاليًا</option>
            <option value="soon">قريبًا</option>
          </select>
        </label>
        <label className="field-label">لون الملصق
          <div className="gradient-picker">
            {GRADIENT_PRESETS.map((g, i) => (
              <button key={i} type="button" className={"gradient-swatch" + (f.gradient[0] === g[0] ? " gradient-swatch-active" : "")}
                style={{ background: `linear-gradient(135deg, ${g[0]}, ${g[1]})` }} onClick={() => setF((p) => ({ ...p, gradient: g }))} />
            ))}
          </div>
        </label>
      </div>
      <label className="field-label">بوستر الفيلم
        <div className="poster-field">
          {f.poster ? (
            <div className="poster-preview">
              <img src={f.poster} alt="" />
              <button type="button" className="btn-secondary" onClick={() => setF((p) => ({ ...p, poster: null }))}>إزالة الصورة</button>
            </div>
          ) : (
            <div className="poster-preview poster-preview-empty" style={{ background: `linear-gradient(135deg, ${f.gradient[0]}, ${f.gradient[1]})` }}>
              <span>بدون صورة — يظهر اللون</span>
            </div>
          )}
          <input type="file" accept="image/*" onChange={onPosterFile} disabled={posterLoading} />
          {posterLoading && <span className="poster-hint">جارِ ضغط الصورة...</span>}
          {posterError && <span className="poster-hint poster-hint-error">{posterError}</span>}
          <input
            type="text" className="poster-url-input" placeholder="أو الصق رابط صورة مباشر (اختياري)"
            value={f.poster && f.poster.startsWith("http") ? f.poster : ""}
            onChange={(e) => setF((p) => ({ ...p, poster: e.target.value || null }))}
          />
        </div>
      </label>
      <label className="field-label">صورة عريضة (بانر يظهر بالأعلى) — اختياري
        <div className="poster-field">
          {f.banner ? (
            <div className="poster-preview">
              <img className="banner-preview-img" src={f.banner} alt="" />
              <button type="button" className="btn-secondary" onClick={() => setF((p) => ({ ...p, banner: null }))}>إزالة الصورة</button>
            </div>
          ) : (
            <div className="poster-preview poster-preview-empty banner-preview-empty" style={{ background: `linear-gradient(135deg, ${f.gradient[0]}, ${f.gradient[1]})` }}>
              <span>بدون بانر — تُستخدم صورة البوستر بدلها</span>
            </div>
          )}
          <input type="file" accept="image/*" onChange={onBannerFile} disabled={bannerLoading} />
          {bannerLoading && <span className="poster-hint">جارِ ضغط الصورة...</span>}
          {bannerError && <span className="poster-hint poster-hint-error">{bannerError}</span>}
          <input
            type="text" className="poster-url-input" placeholder="أو الصق رابط صورة عريضة مباشر (اختياري)"
            value={f.banner && f.banner.startsWith("http") ? f.banner : ""}
            onChange={(e) => setF((p) => ({ ...p, banner: e.target.value || null }))}
          />
        </div>
      </label>
      <label className="field-label">رابط التريلر الرسمي (يوتيوب مثلًا) — اختياري
        <input type="text" placeholder="https://youtube.com/watch?v=..." value={f.trailerUrl} onChange={(e) => setF((p) => ({ ...p, trailerUrl: e.target.value }))} />
      </label>
      <label className="field-label">الأنواع
        <div className="filter-genres">
          {GENRE_KEYS.map((g) => (
            <button key={g} type="button" className={"chip" + (f.genres.includes(g) ? " chip-active" : "")} onClick={() => toggleGenre(g)}>{GENRE_LABELS_AR[g]}</button>
          ))}
        </div>
      </label>
      <label className="field-label">القصة (عربي)<textarea rows={3} value={f.synopsisAr} onChange={(e) => setF((p) => ({ ...p, synopsisAr: e.target.value }))} /></label>
      <label className="field-label">Synopsis (English)<textarea rows={3} value={f.synopsisEn} onChange={(e) => setF((p) => ({ ...p, synopsisEn: e.target.value }))} /></label>
      <label className="field-label">طاقم التمثيل (افصل بفاصلة)<input value={f.cast} onChange={(e) => setF((p) => ({ ...p, cast: e.target.value }))} placeholder="أ. الجبوري, ل. حسن" /></label>
      <label className="field-label">أوقات العرض
        <div className="showtime-editor">
          {f.showtimes.length > 0 && (
            <div className="showtime-chips">
              {f.showtimes.map((tm, i) => (
                <span className="chip chip-active showtime-chip" key={i}>
                  <Num>{tm}</Num>
                  <button type="button" className="showtime-chip-remove" onClick={() => removeTime(i)}><X size={11} /></button>
                </span>
              ))}
            </div>
          )}
          <div className="showtime-add-row">
            <input
              type="text" placeholder="مثلًا: 6:30 م" value={timeInput}
              onChange={(e) => setTimeInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); addTime(); } }}
            />
            <button type="button" className="btn-secondary" onClick={addTime}><Plus size={14} /> إضافة</button>
          </div>
        </div>
      </label>
      <div className="form-actions">
        {formError && <span className="poster-hint poster-hint-error" style={{ marginInlineEnd: "auto" }}>{formError}</span>}
        <button className="btn-secondary" onClick={onCancel}>إلغاء</button>
        <button className="btn-primary" onClick={save}><Save size={15} /> حفظ الفيلم</button>
      </div>
    </div>
  );
}

function MoviesTab({ movies, saveMovies }) {
  const [editing, setEditing] = useState(null); // null = closed, {} = new, {...movie} = edit
  const upsert = (record) => {
    const exists = movies.some((m) => m.id === record.id);
    const next = exists ? movies.map((m) => (m.id === record.id ? record : m)) : [...movies, record];
    saveMovies(next);
    setEditing(null);
  };
  const remove = (id) => saveMovies(movies.filter((m) => m.id !== id));

  return (
    <div className="tab-panel">
      {!editing ? (
        <>
          <div className="tab-panel-header">
            <h3>إدارة الأفلام</h3>
            <button className="btn-primary" onClick={() => setEditing({})}><Plus size={15} /> أضف فيلم</button>
          </div>
          <div className="movies-table">
            {movies.map((m) => (
              <div className="movie-row" key={m.id}>
                {m.poster ? (
                  <img className="movie-row-swatch" src={m.poster} alt="" />
                ) : (
                  <span className="movie-row-swatch" style={{ background: `linear-gradient(135deg, ${m.gradient[0]}, ${m.gradient[1]})` }} />
                )}
                <div className="movie-row-info">
                  <strong>{m.titleAr}</strong>
                  <span>{m.genres.map((g) => GENRE_LABELS_AR[g]).join(" • ")} · <Num>{m.duration}</Num> د · <Num>{m.rating}</Num>★</span>
                </div>
                <span className={"status-badge " + (m.status === "showing" ? "badge-confirmed" : "badge-pending")}>
                  {m.status === "showing" ? "يعرض حاليًا" : "قريبًا"}
                </span>
                <div className="booking-actions">
                  <button className="btn-icon" onClick={() => setEditing(m)}><Pencil size={14} /></button>
                  <button className="btn-icon btn-icon-cancel" onClick={() => remove(m.id)}><Trash2 size={14} /></button>
                </div>
              </div>
            ))}
          </div>
        </>
      ) : (
        <MovieForm initial={editing.id ? editing : null} onSave={upsert} onCancel={() => setEditing(null)} />
      )}
    </div>
  );
}

/* -------------------------------- Settings tab -------------------------------- */
function SettingsTab({ business, pricing, snacks, saveSettings }) {
  const [b, setB] = useState(business);
  const [p, setP] = useState(pricing);
  const [s, setS] = useState(snacks);
  const [saved, setSaved] = useState(false);

  const updateSnack = (id, field, value) => setS((prev) => prev.map((x) => (x.id === id ? { ...x, [field]: value } : x)));
  const addSnack = () => setS((prev) => [...prev, { id: genId("snack"), nameAr: "", nameEn: "", descAr: "", descEn: "", price: 0 }]);
  const removeSnack = (id) => setS((prev) => prev.filter((x) => x.id !== id));

  const save = () => {
    saveSettings({ business: b, pricing: { standard: Number(p.standard) || 0, glasses3d: Number(p.glasses3d) || 0 }, snacks: s });
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const bf = (key) => ({ value: b[key] || "", onChange: (e) => setB((prev) => ({ ...prev, [key]: e.target.value })) });

  return (
    <div className="tab-panel">
      <h3>معلومات السينما</h3>
      <div className="card">
        <div className="form-grid-2">
          <label className="field-label">الاسم (عربي)<input {...bf("nameAr")} /></label>
          <label className="field-label">Name (English)<input {...bf("nameEn")} /></label>
        </div>
        <div className="form-grid-2">
          <label className="field-label">الشعار (عربي)<input {...bf("taglineAr")} /></label>
          <label className="field-label">Tagline (English)<input {...bf("taglineEn")} /></label>
        </div>
        <div className="form-grid-2">
          <label className="field-label">رقم الهاتف (للعرض)<input {...bf("phoneDisplay")} /></label>
          <label className="field-label">رابط واتساب (wa.me/...)<input {...bf("whatsapp")} /></label>
        </div>
        <div className="form-grid-2">
          <label className="field-label">إنستغرام (رابط)<input {...bf("instagram")} /></label>
          <label className="field-label">فيسبوك (رابط)<input {...bf("facebook")} /></label>
        </div>
        <label className="field-label">العنوان (عربي)<input {...bf("addressAr")} /></label>
        <label className="field-label">Address (English)<input {...bf("addressEn")} /></label>
      </div>

      <h3>الأسعار</h3>
      <div className="card form-grid-3">
        <label className="field-label">سعر التذكرة العادية<input type="number" value={p.standard} onChange={(e) => setP((prev) => ({ ...prev, standard: e.target.value }))} /></label>
        <label className="field-label">سعر نظارة 3D<input type="number" value={p.glasses3d} onChange={(e) => setP((prev) => ({ ...prev, glasses3d: e.target.value }))} /></label>
      </div>

      <h3>الوجبات والأسعار</h3>
      <div className="card">
        {s.map((item) => (
          <div className="snack-edit-row" key={item.id}>
            <span className="snack-edit-icon">{React.createElement(ICON_MAP[item.id] || Popcorn, { size: 16, color: "#D4AF37" })}</span>
            <input value={item.nameAr} onChange={(e) => updateSnack(item.id, "nameAr", e.target.value)} placeholder="الاسم" />
            <input type="number" value={item.price} onChange={(e) => updateSnack(item.id, "price", Number(e.target.value))} placeholder="السعر" />
            <button type="button" className="btn-icon btn-icon-cancel" onClick={() => removeSnack(item.id)} title="حذف"><Trash2 size={14} /></button>
          </div>
        ))}
        <button type="button" className="btn-secondary" style={{ marginTop: "10px" }} onClick={addSnack}><Plus size={15} /> أضف وجبة / عصير جديد</button>
      </div>

      <div className="form-actions">
        <button className="btn-primary" onClick={save}><Save size={15} /> حفظ كل الإعدادات</button>
        {saved && <span className="toast-success"><Check size={13} /> تم الحفظ</span>}
      </div>
    </div>
  );
}

const ICON_MAP = { popcorn: Popcorn, drink: Coffee, nachos: Sandwich, glasses3d: Glasses };

function App() {
  const [authed, setAuthed] = useState(false);
  const [tab, setTab] = useState("bookings");
  const [refreshing, setRefreshing] = useState(false);

  const [movies, setMovies] = useState(DEFAULT_MOVIES);
  const [business, setBusiness] = useState(DEFAULT_BUSINESS);
  const [pricing, setPricing] = useState(DEFAULT_PRICING);
  const [snacks, setSnacks] = useState(DEFAULT_SNACKS);
  const [bookings, setBookings] = useState([]);

  const loadAll = useCallback(async () => {
    setRefreshing(true);
    const [m, settings, b] = await Promise.all([Store.get("mc_movies"), Store.get("mc_settings"), Store.get("mc_bookings")]);
    if (Array.isArray(m)) setMovies(m);
    if (settings) {
      if (settings.business) setBusiness((prev) => ({ ...prev, ...settings.business }));
      if (settings.pricing) setPricing((prev) => ({ ...prev, ...settings.pricing }));
      if (Array.isArray(settings.snacks) && settings.snacks.length) setSnacks(settings.snacks);
    }
    if (Array.isArray(b)) setBookings(b);
    setRefreshing(false);
  }, []);

  useEffect(() => {
    if (!authed) return;
    loadAll();
    const interval = setInterval(loadAll, 7000); // live-ish polling for new online bookings
    return () => clearInterval(interval);
  }, [authed, loadAll]);

  const updateBooking = async (id, status) => {
    const next = bookings.map((b) => (b.id === id ? { ...b, status } : b));
    setBookings(next);
    await Store.set("mc_bookings", next);
  };

  const handleSell = async (record) => {
    const next = [...bookings, record];
    setBookings(next);
    await Store.set("mc_bookings", next);
  };

  const saveMovies = async (next) => {
    setMovies(next);
    await Store.set("mc_movies", next);
  };

  const saveSettings = async ({ business: nb, pricing: np, snacks: ns }) => {
    setBusiness(nb); setPricing(np); setSnacks(ns);
    await Store.set("mc_settings", { business: nb, pricing: np, snacks: ns });
  };

  if (!authed) return React.createElement(
    "div", { className: "admin-root", dir: "rtl" },
    React.createElement("style", null, CSS),
    React.createElement(PinGate, { onSuccess: () => setAuthed(true) })
  );

  return (
    <div className="admin-root" dir="rtl">
      <style>{CSS}</style>
      <TopBar tab={tab} setTab={setTab} business={business} onRefresh={loadAll} refreshing={refreshing} onLogout={() => setAuthed(false)} />
      <main className="admin-main">
        {tab === "bookings" && <BookingsTab bookings={bookings} updateBooking={updateBooking} />}
        {tab === "pos" && <PosTab movies={movies} pricing={pricing} snacks={snacks} bookings={bookings} onSell={handleSell} />}
        {tab === "movies" && <MoviesTab movies={movies} saveMovies={saveMovies} />}
        {tab === "settings" && <SettingsTab business={business} pricing={pricing} snacks={snacks} saveSettings={saveSettings} />}
      </main>
    </div>
  );
}

.admin-tabs{ display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:4px; }
.admin-tab{ display:flex; align-items:center; gap:6px; background:none; border:none; color:var(--text-dim); font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:9px; cursor:pointer; font-family:inherit; }
.admin-tab-active{ background:var(--red); color:#fff; }
.admin-actions{ display:flex; gap:8px; }
.admin-tabs-mobile{ display:none; }

/* ---------- Main / cards ---------- */
.admin-main{ max-width:1300px; margin:0 auto; padding:26px 24px 60px; }
.tab-panel{ display:flex; flex-direction:column; gap:18px; }
.tab-panel-header{ display:flex; align-items:center; justify-content:space-between; }
.tab-panel-header h3, .tab-panel h3{ font-size:17px; margin:6px 0 0; }
.card{ background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:18px; display:flex; flex-direction:column; gap:14px; }

/* ---------- Stats ---------- */
.stats-row{ display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:14px; }
.stat-card{ background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; display:flex; flex-direction:column; gap:6px; }
.stat-label{ font-size:12px; color:var(--text-dim); }
.stat-value{ font-family:'Bebas Neue', sans-serif; font-size:24px; }
.stat-pending{ color:var(--gold); } .stat-confirmed{ color:var(--green); } .stat-revenue{ color:#fff; }

/* ---------- Filters / chips ---------- */
.filter-chips, .filter-genres{ display:flex; gap:8px; flex-wrap:wrap; }
.chip{ background:var(--surface); border:1px solid var(--border); color:var(--text-dim); padding:7px 14px; border-radius:999px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; }
.chip-active{ background:var(--red); border-color:var(--red); color:#fff; }

/* ---------- Bookings list ---------- */
.booking-list{ display:flex; flex-direction:column; gap:10px; }
.booking-row{ display:flex; align-items:center; justify-content:space-between; gap:14px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 16px; flex-wrap:wrap; }
.booking-main{ display:flex; flex-direction:column; gap:6px; flex:1; min-width:220px; }
.booking-row-top{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.booking-row-meta{ display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:var(--text-dim); }
.booking-row-meta span{ display:flex; align-items:center; gap:5px; }
.booking-row-customer{ display:flex; align-items:center; gap:6px; font-size:12px; color:#d1d5db; }
.customer-phone-link{ color:var(--green); text-decoration:none; font-weight:700; }
.booking-actions{ display:flex; gap:8px; }
.status-badge{ font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; }
.badge-pending{ background:rgba(212,175,55,0.15); color:var(--gold); }
.badge-confirmed{ background:rgba(0,230,118,0.15); color:var(--green); }
.badge-cancelled{ background:rgba(122,12,19,0.25); color:#ff8a92; }
.source-tag{ font-size:10px; font-weight:700; padding:3px 8px; border-radius:999px; }
.source-online{ background:rgba(28,126,214,0.18); color:#7cc4ff; }
.source-cashier{ background:rgba(212,175,55,0.15); color:var(--gold); }
.empty-state{ display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:44px 0; color:var(--text-dim); font-size:13.5px; }

/* ---------- POS ---------- */
.pos-grid{ display:grid; grid-template-columns:340px 1fr; gap:18px; align-items:start; }
.pos-config{ position:sticky; top:90px; }
.field-label{ display:flex; flex-direction:column; gap:6px; font-size:12px; color:var(--text-dim); font-weight:600; }
.field-label input, .field-label select, .field-label textarea{ background:var(--surface-2); border:1px solid var(--border); border-radius:9px; padding:10px 12px; color:#fff; font-size:13px; outline:none; font-family:inherit; }
.field-label input:focus, .field-label select:focus, .field-label textarea:focus{ border-color:var(--red); }
.subheading{ font-size:12px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); margin-top:4px; }
.date-row{ display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; }
.date-pill{ display:flex; flex-direction:column; align-items:center; gap:2px; min-width:50px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:8px 4px; cursor:pointer; color:var(--text-dim); flex-shrink:0; font-family:inherit; }
.date-pill-day{ font-size:10px; } .date-pill-num{ font-size:14px; font-weight:800; color:#fff; }
.date-pill-active{ background:rgba(229,9,20,0.18); border-color:var(--red); }
.time-row{ display:flex; gap:6px; flex-wrap:wrap; }
.time-pill{ background:var(--surface-2); border:1px solid var(--border); color:#d1d5db; padding:8px 12px; border-radius:9px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:inherit; }
.time-pill-active{ background:var(--green); border-color:var(--green); color:#03210f; }
.addons-panel{ display:flex; flex-direction:column; gap:8px; }
.addon-row{ display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:9px 11px; }
.addon-icon{ width:32px; height:32px; border-radius:8px; background:rgba(212,175,55,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.addon-info{ flex:1; display:flex; flex-direction:column; }
.addon-name{ font-size:12.5px; font-weight:700; } .addon-desc{ font-size:11px; color:var(--text-dim); }
.qty-stepper{ display:flex; align-items:center; gap:8px; }
.qty-stepper button{ width:24px; height:24px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.qty-stepper button:disabled{ opacity:.3; cursor:not-allowed; }
.qty-stepper span{ min-width:14px; text-align:center; font-weight:700; font-size:12.5px; }

.pos-seats{ min-height:400px; }
.seatmap-wrap{ display:flex; flex-direction:column; align-items:center; gap:18px; padding:6px 0; }
.screen-wrap{ display:flex; flex-direction:column; align-items:center; gap:8px; width:100%; }
.screen-curve{ width:70%; max-width:360px; height:12px; border-radius:50% 50% 0 0/100% 100% 0 0; background:linear-gradient(180deg, rgba(0,230,118,0.6), rgba(0,230,118,0.05)); box-shadow:0 0 26px 5px rgba(0,230,118,0.3); }
.screen-label{ font-size:10px; letter-spacing:3px; color:var(--text-dim); }
.seat-rows{ display:flex; flex-direction:column; gap:6px; width:100%; align-items:center; }
.seat-row{ display:flex; align-items:center; gap:8px; }
.row-label{ font-size:10px; color:#5b5f6a; width:12px; text-align:center; }
.seat-row-seats{ display:flex; gap:5px; }
.seat{ width:20px; height:20px; border-radius:5px 5px 7px 7px; border:none; cursor:pointer; transition:transform .15s; }
.seat:hover:not(:disabled){ transform:translateY(-2px) scale(1.12); }
.seat-standard{ background:#3a4250; } .seat-vip{ background:linear-gradient(160deg, var(--gold), #8a6d1a); }
.seat-selected{ background:var(--green); box-shadow:0 0 10px rgba(0,230,118,0.7); }
.seat-booked{ background:var(--danger); opacity:.55; cursor:not-allowed; }
.seat-legend{ display:flex; gap:14px; flex-wrap:wrap; justify-content:center; font-size:11px; color:var(--text-dim); }
.legend-item{ display:flex; align-items:center; gap:6px; }
.legend-swatch{ width:12px; height:12px; border-radius:3px; display:inline-block; }
.pos-summary{ border-top:1px solid var(--border); margin-top:16px; padding-top:14px; display:flex; flex-direction:column; gap:6px; }
.stub-row{ display:flex; justify-content:space-between; font-size:13px; color:#d1d5db; }
.stub-total{ font-weight:800; font-size:15px; color:#fff; border-top:1px dashed var(--border); padding-top:8px; margin-top:4px; }
.toast-success{ display:flex; align-items:center; gap:6px; color:var(--green); font-size:12.5px; font-weight:700; margin:8px 0 0; justify-content:center; }

/* ---------- Movies table ---------- */
.movies-table{ display:flex; flex-direction:column; gap:8px; }
.movie-row{ display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 14px; }
.movie-row-swatch{ width:36px; height:36px; border-radius:8px; flex-shrink:0; object-fit:cover; }
.poster-field{ display:flex; flex-direction:column; gap:8px; align-items:flex-start; }
.poster-preview{ display:flex; align-items:center; gap:12px; }
.poster-preview img{ width:64px; height:96px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
.poster-preview-empty{ width:64px; height:96px; border-radius:8px; display:flex; align-items:center; justify-content:center; text-align:center; padding:6px; }
.poster-preview-empty span{ font-size:10px; color:rgba(255,255,255,0.8); }
.poster-hint{ font-size:12px; color:var(--text-dim); }
.poster-hint-error{ color:var(--red); }
.poster-url-input{ width:100%; }
.banner-preview-img{ width:220px; height:90px; object-fit:cover; border-radius:8px; border:1px solid var(--border); }
.banner-preview-empty{ width:220px; height:90px; }
.showtime-editor{ display:flex; flex-direction:column; gap:10px; }
.showtime-chips{ display:flex; flex-wrap:wrap; gap:8px; }
.showtime-chip{ display:inline-flex; align-items:center; gap:6px; }
.showtime-chip-remove{ display:flex; align-items:center; justify-content:center; background:transparent; border:none; color:inherit; cursor:pointer; padding:0; opacity:0.75; }
.showtime-chip-remove:hover{ opacity:1; }
.showtime-add-row{ display:flex; gap:8px; }
.showtime-add-row input{ flex:1; }
.movie-row-info{ flex:1; display:flex; flex-direction:column; gap:2px; }
.movie-row-info strong{ font-size:13.5px; } .movie-row-info span{ font-size:11.5px; color:var(--text-dim); }

/* ---------- Forms ---------- */
.form-grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.form-grid-3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
.form-actions{ display:flex; align-items:center; gap:12px; }
.movie-form{ gap:14px; }
.gradient-picker{ display:flex; gap:8px; }
.gradient-swatch{ width:30px; height:30px; border-radius:8px; border:2px solid transparent; cursor:pointer; }
.gradient-swatch-active{ border-color:#fff; }
.snack-edit-row{ display:flex; align-items:center; gap:10px; }
.snack-edit-icon{ width:30px; height:30px; border-radius:8px; background:rgba(212,175,55,0.12); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.snack-edit-row input{ background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; color:#fff; font-size:12.5px; font-family:inherit; }
.snack-edit-row input:first-of-type{ flex:1; }
.snack-edit-row input:last-of-type{ width:100px; }

/* ---------- Responsive ---------- */
@media (max-width: 900px){
  .pos-grid{ grid-template-columns:1fr; }
  .pos-config{ position:static; }
}
@media (max-width: 700px){
  .admin-tabs{ display:none; }
  .admin-tabs-mobile{ display:flex; gap:6px; overflow-x:auto; padding:8px 14px 12px; border-top:1px solid var(--border); }
  .form-grid-2, .form-grid-3{ grid-template-columns:1fr; }
}
`;
